<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ryvos</title>
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body>
  <!-- Login overlay -->
  <div id="login-overlay" class="overlay hidden">
    <div class="login-box">
      <h2>Ryvos</h2>
      <p>Enter your API key to connect.</p>
      <input type="password" id="api-key-input" placeholder="API key (Bearer token)" autofocus>
      <button id="login-btn">Connect</button>
      <p class="login-hint">Leave blank if no auth is configured.</p>
    </div>
  </div>

  <!-- Main layout -->
  <div id="app" class="app-layout">
    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-header">
        <h1>Ryvos</h1>
      </div>
      <nav class="sidebar-nav">
        <a href="#/dashboard" class="nav-item active" data-route="dashboard">Dashboard</a>
        <a href="#/sessions" class="nav-item" data-route="sessions">Sessions</a>
        <a href="#/runs" class="nav-item" data-route="runs">Runs</a>
        <a href="#/costs" class="nav-item" data-route="costs">Costs</a>
        <a href="#/settings" class="nav-item" data-route="settings">Settings</a>
      </nav>
      <div class="sidebar-footer">
        <button id="logout-btn" class="btn-link">Disconnect</button>
      </div>
    </aside>

    <!-- Content area -->
    <main id="content" class="content-area">
      <!-- Dynamic content rendered by app.js -->
    </main>
  </div>

  <script src="/assets/app.js"></script>
</body>
</html>
